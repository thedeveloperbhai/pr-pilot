<svg width="40" height="40" viewBox="0 0 160 150" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- ═══════════════════════════════════
       LEFT BRANCH  (x-centre = 48)
       ═══════════════════════════════════ -->

  <!-- Top node: light-blue glow blob behind -->
  <circle cx="58"  cy="36"  r="22" fill="#ADD8F5" opacity="0.75"/>
  <!-- Top node: bold open arc (270° → leaves gap at bottom-right) -->
  <path d="M48 14 A22 22 0 1 1 26 36"
        stroke="#1C2D50" stroke-width="12" stroke-linecap="round" fill="none"/>

  <!-- Trunk connecting line -->
  <line x1="48" y1="58" x2="48" y2="98"
        stroke="#1C2D50" stroke-width="12" stroke-linecap="round"/>

  <!-- Bottom node: light-blue glow blob -->
  <circle cx="58" cy="118" r="22" fill="#ADD8F5" opacity="0.75"/>
  <!-- Bottom node: bold open arc -->
  <path d="M48 96 A22 22 0 1 1 26 118"
        stroke="#1C2D50" stroke-width="12" stroke-linecap="round" fill="none"/>


  <!-- ═══════════════════════════════════
       RIGHT BRANCH  (x-centre = 112)
       ═══════════════════════════════════ -->

  <!-- Left-pointing arrow at top -->
  <!-- Horizontal shaft of arrow -->
  <line x1="90" y1="36" x2="136" y2="36"
        stroke="#1C2D50" stroke-width="12" stroke-linecap="round"/>
  <!-- Arrowhead (pointing left) -->
  <polyline points="106,18 88,36 106,54"
            stroke="#1C2D50" stroke-width="12"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Rounded-rect path: right side down, then curve left to bottom node -->
  <path d="M136 36 Q148 36 148 50 L148 100 Q148 114 136 114 L112 114"
        stroke="#1C2D50" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Bottom-right node: light-blue glow blob -->
  <circle cx="122" cy="118" r="22" fill="#ADD8F5" opacity="0.75"/>
  <!-- Bottom-right node: bold open arc -->
  <path d="M112 96 A22 22 0 1 1 90 118"
        stroke="#1C2D50" stroke-width="12" stroke-linecap="round" fill="none"/>

</svg>

