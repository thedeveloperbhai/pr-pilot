<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#7c3aed"/>
  <!-- Code branches / PR icon -->
  <!-- Left branch dot -->
  <circle cx="18" cy="20" r="5" fill="#fff"/>
  <!-- Right branch dot -->
  <circle cx="46" cy="20" r="5" fill="#c4b5fd"/>
  <!-- Bottom merge dot -->
  <circle cx="32" cy="48" r="5" fill="#fff"/>
  <!-- Left branch line down -->
  <line x1="18" y1="25" x2="18" y2="40" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right branch line down -->
  <line x1="46" y1="25" x2="46" y2="35" stroke="#c4b5fd" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Merge lines -->
  <path d="M18 40 Q18 48 32 48" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M46 35 Q46 48 32 48" stroke="#c4b5fd" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- AI spark -->
  <circle cx="46" cy="20" r="8" fill="none" stroke="#e9d5ff" stroke-width="1.5" stroke-dasharray="2 2"/>
  <!-- Small star in the spark circle -->
  <text x="43" y="24" fill="#fff" font-size="10" font-family="sans-serif">✦</text>
</svg>

